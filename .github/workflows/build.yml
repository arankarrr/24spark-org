name: Build 24spark firmware

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

env:
  IMMORTALWRT_VERSION: "24.10.5"
  TARGET: mediatek/filogic
  DEVICE: xiaomi_mi-router-ax3000t

jobs:
  build:
    runs-on: ubuntu-24.04
    name: Xiaomi AX3000T

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libncurses-dev zlib1g-dev gawk git \
            gettext libssl-dev xsltproc rsync wget unzip python3

      - name: Download Image Builder
        run: |
          URL="https://downloads.immortalwrt.org/releases/${IMMORTALWRT_VERSION}/targets/${TARGET}/immortalwrt-imagebuilder-${IMMORTALWRT_VERSION}-mediatek-filogic.Linux-x86_64.tar.zst"
          wget -q "$URL" -O imagebuilder.tar.zst
          tar --use-compress-program=unzstd -xf imagebuilder.tar.zst
          mv immortalwrt-imagebuilder-* imagebuilder

      - name: Prepare files overlay
        run: |
          mkdir -p imagebuilder/files
          cp -r files/. imagebuilder/files/
          cp -r packages/luci-theme-24spark/htdocs/. imagebuilder/files/
          mkdir -p imagebuilder/files/usr/lib/lua/luci/view/themes/24spark
          cp packages/luci-theme-24spark/luasrc/view/themes/24spark/*.htm \
            imagebuilder/files/usr/lib/lua/luci/view/themes/24spark/

      - name: Build image
        working-directory: imagebuilder
        run: |
          make image \
            PROFILE="${DEVICE}" \
            PACKAGES="luci luci-base luci-mod-admin-full luci-app-firewall \
                      luci-app-opkg sing-box curl ca-bundle \
                      kmod-nft-tproxy kmod-nf-tproxy kmod-nft-fullcone" \
            FILES="files/" \
            EXTRA_IMAGE_NAME="24spark"

      - name: List build output
        run: find imagebuilder/bin/targets/ -type f | sort

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: 24spark-ax3000t-${{ github.sha }}
          path: |
            imagebuilder/bin/targets/*/*sysupgrade*
            imagebuilder/bin/targets/*/*factory*
            imagebuilder/bin/targets/*/sha256sums
          retention-days: 30

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: imagebuilder/bin/targets/*/*sysupgrade*
          generate_release_notes: true
