name: Build 24spark firmware

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    name: Xiaomi AX3000T

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib \
            gettext git libncurses-dev libssl-dev python3-distutils \
            rsync unzip zlib1g-dev file wget

      - name: Clone ImmortalWrt
        run: |
          git clone --depth 1 -b openwrt-24.10 \
            https://github.com/immortalwrt/immortalwrt.git buildroot

      - name: Add custom feeds
        run: |
          echo "src-link 24spark $GITHUB_WORKSPACE/packages" >> buildroot/feeds.conf.default

      - name: Update & install feeds
        working-directory: buildroot
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Copy files overlay
        run: |
          cp -r $GITHUB_WORKSPACE/files/. buildroot/files/

      - name: Apply build config
        run: |
          cp $GITHUB_WORKSPACE/config/ax3000t.config buildroot/.config
          cd buildroot && make defconfig

      - name: Build firmware
        working-directory: buildroot
        run: make -j$(nproc) V=s 2>&1 | tee build.log | tail -50

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: 24spark-ax3000t-${{ github.sha }}
          path: |
            buildroot/bin/targets/mediatek/filogic/*.bin
            buildroot/bin/targets/mediatek/filogic/*.img.gz
          retention-days: 30

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            buildroot/bin/targets/mediatek/filogic/*.bin
            buildroot/bin/targets/mediatek/filogic/*.img.gz
          generate_release_notes: true
